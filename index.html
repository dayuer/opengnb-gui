<!DOCTYPE html>
<html lang="zh-CN" class="light" style="color-scheme: light dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SynonClaw Console — P2P VPN 节点管理中控台，实时监控、审批注册、AI 智能运维">
  <meta name="theme-color" content="#4b41e1" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
  <title>SynonClaw Console</title>
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></link>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      /* 主色系 — Indigo Cloud */
      --color-primary: #4b41e1;
      --color-primary-light: #645efb;
      --color-primary-dark: #3323cc;
      --color-primary-subtle: rgba(75, 65, 225, 0.08);
      --color-primary-container: #e2dfff;
      --color-secondary: #006c4a;
      --color-secondary-container: #82f5c1;
      /* 背景色 — Indigo Cloud Light */
      --color-surface: #ffffff;
      --color-elevated: #f2f4f6;
      --color-base: #f7f9fb;
      --color-overlay: rgba(25, 28, 30, 0.5);
      --color-surface-container: #eceef0;
      /* 边框色 */
      --color-border-default: #e0e3e5;
      --color-border-subtle: #eceef0;
      --color-border-focus: #4b41e1;
      /* 文字色 — Indigo Cloud on-surface */
      --color-text-primary: #191c1e;
      --color-text-secondary: #464554;
      --color-text-muted: #767586;
      --color-text-inverse: #ffffff;
      /* 语义色 */
      --color-success: #006c4a;
      --color-warning: #c76e00;
      --color-warning-container: #ffe0b2;
      --color-danger: #ba1a1a;
      --color-info: #4b41e1;
      --color-error-container: #ffdad6;
      /* 字体 */
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-headline: 'Manrope', 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      /* 圆角 */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      /* 阴影 — 亮色模式柔和阴影 */
      --shadow-sm: 0 1px 3px rgba(25, 28, 30, 0.06);
      --shadow-md: 0 4px 12px rgba(25, 28, 30, 0.08);
      --shadow-lg: 0 10px 30px rgba(25, 28, 30, 0.06);
      --shadow-glow: 0 0 20px rgba(75, 65, 225, 0.15);
      /* 字号 */
      --text-xs: 11px;
    }

    /* 全局滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--color-border-default); border-radius: 3px; }

    /* 健康圆环 SVG */
    .health-ring-bg { fill: none; stroke: var(--color-border-default); stroke-width: 4; }
    .health-ring-fg { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.6s; }
    .health-ring-fg.online { stroke: var(--color-success); }
    .health-ring-fg.offline { stroke: var(--color-danger); }

    /* 自定义进度条 */
    .gauge-bar { height: 6px; border-radius: 9999px; background: var(--color-border-default); overflow: hidden; }
    .gauge-fill { height: 100%; border-radius: 9999px; transition: width 0.6s ease; }

    /* Stitch 亮色 glassmorphism */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* 网格点阵背景 */
    .bg-grid-pattern {
      background-image: radial-gradient(circle, rgba(75, 65, 225, 0.08) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* 品牌渐变 */
    .signature-gradient { background: linear-gradient(135deg, #4b41e1 0%, #645efb 100%); }

    /* 亮色模式环境阴影 */
    .shadow-ambient { box-shadow: 0 10px 30px rgba(25, 28, 30, 0.06); }

    /* 微动画 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out both; }
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }

    /* 等宽数字 */
    .tabular-nums { font-variant-numeric: tabular-nums; }

    /* 尊重用户减弱动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Dark Mode Token 覆盖 ── */
    .dark {
      --color-primary: #8b83ff;
      --color-primary-light: #a5a0ff;
      --color-primary-dark: #645efb;
      --color-primary-subtle: rgba(139, 131, 255, 0.12);
      --color-primary-container: #312d6e;
      --color-secondary: #6edba5;
      --color-secondary-container: #004d34;
      --color-surface: #1a1a2e;
      --color-elevated: #252540;
      --color-base: #12121f;
      --color-overlay: rgba(0, 0, 0, 0.7);
      --color-surface-container: #1e1e34;
      --color-border-default: #2e2e4a;
      --color-border-subtle: #252540;
      --color-border-focus: #8b83ff;
      --color-text-primary: #e8e6f0;
      --color-text-secondary: #a8a6b8;
      --color-text-muted: #6e6d80;
      --color-text-inverse: #12121f;
      --color-success: #6edba5;
      --color-warning: #ffb74d;
      --color-warning-container: #4a3000;
      --color-danger: #ff6b6b;
      --color-info: #8b83ff;
      --color-error-container: #4a1c1c;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 20px rgba(139, 131, 255, 0.2);
    }
    .dark .glass-card {
      background: rgba(26, 26, 46, 0.8);
    }
    .dark .bg-grid-pattern {
      background-image: radial-gradient(circle, rgba(139, 131, 255, 0.1) 1px, transparent 1px);
    }
    .dark .signature-gradient {
      background: linear-gradient(135deg, #645efb 0%, #8b83ff 100%);
    }
  </style>
</head>
<body class="bg-base text-text-primary font-sans antialiased min-h-screen" style="touch-action: manipulation">

  <!-- Skip-link: 键盘用户跳过导航直达主内容 -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[999] focus:bg-primary focus:text-white focus:px-4 focus:py-2 focus:rounded-lg focus:text-sm focus:font-semibold">跳到主内容</a>

  <!-- ===== 登录页 ===== -->
  <div id="login-page" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center p-6">
    <!-- 背景层 -->
    <div class="absolute inset-0 bg-grid-pattern -z-10"></div>
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/8 rounded-full blur-[120px] -z-10"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-info/6 rounded-full blur-[120px] -z-10"></div>

    <!-- 登录主体 -->
    <main class="w-full max-w-[440px] z-10">
      <!-- Logo -->
      <div class="text-center mb-10 animate-fade-in-up">
        <img src="/logo-512.png" alt="SynonClaw" width="80" height="80" class="mx-auto mb-5">
        <h1 class="text-3xl font-bold tracking-tight text-text-primary mb-2">SynonClaw Console</h1>
        <p class="text-text-muted font-medium text-sm">P2P VPN 管理中控台</p>
      </div>

      <!-- Glassmorphic 登录卡片 -->
      <div class="glass-card border border-border-default rounded-lg p-8 lg:p-10 shadow-ambient animate-fade-in-up delay-100">
        <form id="login-form" onsubmit="App.doLogin(event)" class="space-y-5">
          <div>
            <label for="login-username" class="block text-xs font-semibold text-text-secondary uppercase tracking-wider mb-2 ml-0.5">用户名</label>
            <div class="relative">
              <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted" aria-hidden="true"></i>
              <input type="text" id="login-username" placeholder="admin" autocomplete="username" required spellcheck="false"
                class="w-full bg-base border-none rounded-lg pl-12 pr-4 py-3.5 text-sm text-text-primary placeholder:text-text-muted focus-visible:ring-2 focus-visible:ring-primary/30 outline-none transition-[box-shadow,border-color] font-medium">
            </div>
          </div>
          <div>
            <label for="login-password" class="block text-xs font-semibold text-text-secondary uppercase tracking-wider mb-2 ml-0.5">密码</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-text-muted" aria-hidden="true"></i>
              <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required
                class="w-full bg-base border-none rounded-lg pl-12 pr-4 py-3.5 text-sm text-text-primary placeholder:text-text-muted focus-visible:ring-2 focus-visible:ring-primary/30 outline-none transition-[box-shadow,border-color]">
            </div>
          </div>
          <div id="login-error" class="hidden text-danger text-xs" role="alert" aria-live="assertive"></div>
          <button type="submit" id="login-btn"
            class="w-full signature-gradient text-white font-semibold py-3.5 rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-transform flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50">
            <span id="login-btn-text">登 录</span>
            <i data-lucide="arrow-right" class="w-4 h-4" aria-hidden="true"></i>
          </button>
        </form>
      </div>

      <!-- 状态页脚 -->
      <div class="mt-8 flex items-center justify-center gap-5 animate-fade-in-up delay-200">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-success animate-pulse" aria-hidden="true"></span>
          <span class="text-xs font-semibold text-text-muted uppercase tracking-widest">系统在线</span>
        </div>
        <div class="w-px h-3 bg-border-default"></div>
        <div class="flex items-center gap-1.5">
          <i data-lucide="globe" class="w-3 h-3 text-text-muted" aria-hidden="true"></i>
          <span class="text-xs font-semibold text-text-muted uppercase tracking-widest">P2P Network</span>
        </div>
      </div>
    </main>

    <!-- 底部品牌 -->
    <footer class="mt-auto pt-10 pb-4 flex flex-col items-center gap-3 animate-fade-in-up delay-300">
      <div class="flex items-center gap-2 opacity-50 hover:opacity-100 transition-opacity">
        <span class="font-semibold text-xs tracking-tight text-text-secondary">Powered by OpenGNB</span>
        <i data-lucide="settings-2" class="w-3.5 h-3.5 text-primary"></i>
      </div>
    </footer>

    <!-- 装饰角元素 -->
    <div class="fixed top-8 left-8 hidden lg:block">
      <div class="text-xs font-semibold text-text-muted uppercase tracking-widest mb-1">Architecture</div>
      <div class="h-px w-12 bg-primary/20"></div>
    </div>
    <div class="fixed bottom-8 right-8 hidden lg:block text-right">
      <div class="text-xs font-semibold text-text-muted uppercase tracking-widest mb-1">Secure Node</div>
      <div class="h-px w-12 bg-primary/20 ml-auto"></div>
    </div>
  </div>

  <!-- ===== 主应用 ===== -->
  <div id="app" class="hidden h-screen flex">
    <!-- 侧边栏 -->
    <nav id="sidebar" aria-label="主导航" class="w-60 bg-surface border-r border-border-default flex flex-col shrink-0 transition-transform duration-300 max-md:fixed max-md:inset-y-0 max-md:left-0 max-md:z-40 max-md:-translate-x-full max-md:data-[open]:translate-x-0">
      <div class="px-4 py-4 border-b border-border-subtle flex items-center gap-3">
        <img src="/logo-36.png" alt="" width="36" height="36" class="w-9 h-9 rounded-lg shrink-0" aria-hidden="true">
        <div class="min-w-0">
          <div class="font-bold text-sm tracking-tight text-text-primary truncate">SynonClaw</div>
          <div class="text-xs text-text-muted uppercase tracking-widest">Console</div>
        </div>
      </div>
      <ul id="nav-menu" class="flex-1 py-3 px-3 space-y-0.5 overflow-y-auto" role="menubar">
        <li role="none"><button class="nav-item w-full group flex items-center gap-3 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors text-text-secondary hover:text-text-primary hover:bg-elevated data-[active]:bg-primary/10 data-[active]:text-primary" data-page="dashboard" data-active role="menuitem">
          <i data-lucide="layout-dashboard" class="w-4 h-4" aria-hidden="true"></i><span>仪表盘</span>
        </button></li>
        <li role="none"><button class="nav-item w-full group flex items-center gap-3 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors text-text-secondary hover:text-text-primary hover:bg-elevated data-[active]:bg-primary/10 data-[active]:text-primary" data-page="nodes" role="menuitem">
          <i data-lucide="globe" class="w-4 h-4" aria-hidden="true"></i><span>节点管理</span>
        </button></li>
        <li role="none"><button class="nav-item w-full group flex items-center gap-3 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors text-text-secondary hover:text-text-primary hover:bg-elevated data-[active]:bg-primary/10 data-[active]:text-primary" data-page="users" role="menuitem">
          <i data-lucide="users" class="w-4 h-4" aria-hidden="true"></i><span>团队设置</span>
        </button></li>
        <li role="none"><button class="nav-item w-full group flex items-center gap-3 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors text-text-secondary hover:text-text-primary hover:bg-elevated data-[active]:bg-primary/10 data-[active]:text-primary" data-page="settings" role="menuitem">
          <i data-lucide="settings" class="w-4 h-4" aria-hidden="true"></i><span>系统设置</span>
        </button></li>
        <li role="none"><button class="nav-item w-full group flex items-center gap-3 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors text-text-secondary hover:text-text-primary hover:bg-elevated data-[active]:bg-primary/10 data-[active]:text-primary" data-page="skills" role="menuitem">
          <i data-lucide="sparkles" class="w-4 h-4" aria-hidden="true"></i><span>技能商店</span>
        </button></li>
      </ul>
      <div class="px-5 py-3 border-t border-border-subtle flex items-center gap-2 text-xs">
        <span id="connection-status" class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-danger/15 text-danger">断开</span>
        <span id="last-update" class="text-text-muted">—</span>
      </div>
    </nav>

    <!-- 侧边栏遮罩（移动端） -->
    <button id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/50 z-30 md:hidden border-none cursor-default" onclick="App.closeSidebar()" aria-label="关闭侧边栏"></button>

    <!-- 主内容区域 -->
    <div id="main-wrapper" class="flex-1 flex flex-col min-w-0">
      <!-- Header -->
      <header class="h-14 bg-surface/80 backdrop-blur border-b border-border-default flex items-center justify-between px-4 shrink-0 sticky top-0 z-20">
        <div class="flex items-center gap-3">
          <button id="sidebar-toggle" class="p-1.5 rounded-lg text-text-secondary hover:text-text-primary hover:bg-elevated transition-colors cursor-pointer md:hidden" aria-label="打开菜单">
            <i data-lucide="menu" class="w-5 h-5" aria-hidden="true"></i>
          </button>
          <h1 id="page-title" class="text-base font-semibold">仪表盘</h1>
        </div>
        <div class="flex items-center gap-3">
          <button id="pending-badge" class="hidden px-2.5 py-1 rounded-full text-xs font-medium bg-warning/15 text-warning cursor-pointer border-none" onclick="App.switchPage('nodes');setTimeout(()=>{const s=document.getElementById('filter-status');if(s){s.value='pending';s.dispatchEvent(new Event('change'))}},100)">
            待审批 <span id="pending-count">0</span>
          </button>
          <!-- 用户菜单 -->
          <div class="relative" id="user-menu">
            <button id="user-menu-trigger" onclick="App.toggleUserMenu()" class="flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-elevated transition-colors cursor-pointer" aria-haspopup="true" aria-expanded="false">
              <span class="w-7 h-7 rounded-full bg-primary/20 text-primary flex items-center justify-center text-xs font-semibold" aria-hidden="true">AD</span>
              <div class="hidden sm:block text-left">
                <div class="text-xs font-medium text-text-primary leading-tight">Admin</div>
                <div class="text-xs text-text-muted">Admin</div>
              </div>
              <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-text-muted" aria-hidden="true"></i>
            </button>
            <!-- 下拉菜单 -->
            <div id="user-dropdown" class="hidden absolute right-0 top-full mt-1 w-56 bg-surface border border-border-default rounded-lg shadow-lg py-1 z-50">
              <div class="px-4 py-2.5 border-b border-border-subtle">
                <div class="text-sm font-medium text-text-primary">Admin</div>
                <div class="text-xs text-text-muted">SynonClaw Console 管理员</div>
              </div>
              <button class="w-full flex items-center gap-2.5 px-4 py-2 text-xs text-text-secondary hover:text-text-primary hover:bg-elevated transition-colors cursor-pointer" onclick="App.closeUserMenu()">
                <i data-lucide="user" class="w-3.5 h-3.5" aria-hidden="true"></i><span>个人资料</span>
              </button>

              <a class="flex items-center gap-2.5 px-4 py-2 text-xs text-text-secondary hover:text-text-primary hover:bg-elevated transition-colors" href="https://github.com/gnbdev/opengnb" target="_blank" rel="noopener" onclick="App.closeUserMenu()">
                <i data-lucide="github" class="w-3.5 h-3.5" aria-hidden="true"></i><span>GitHub</span>
              </a>
              <div class="border-t border-border-subtle my-1"></div>
              <button class="w-full flex items-center gap-2.5 px-4 py-2 text-xs text-text-secondary hover:text-text-primary hover:bg-elevated transition-colors cursor-pointer" onclick="App.toggleTheme()">
                <i data-lucide="sun" id="theme-icon" class="w-3.5 h-3.5" aria-hidden="true"></i><span id="theme-label">亮色模式</span>
              </button>
              <div class="border-t border-border-subtle my-1"></div>
              <button class="w-full flex items-center gap-2.5 px-4 py-2 text-xs text-danger hover:bg-danger/10 transition-colors cursor-pointer" onclick="App.logout()">
                <i data-lucide="log-out" class="w-3.5 h-3.5" aria-hidden="true"></i><span>退出登录</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- 页面内容 -->
      <div id="main-content" class="flex-1 overflow-y-auto p-4 md:p-6"></div>
    </div>
  </div>

  <!-- 全局弹窗 -->
  <div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-overlay backdrop-blur-sm" style="overscroll-behavior: contain" onclick="if(event.target===this)App.closeModal()" role="dialog" aria-modal="true">
    <div id="modal-content" class="bg-surface border border-border-default rounded-lg shadow-lg w-full max-w-md mx-4 p-6"></div>
  </div>

  <!-- Vite TypeScript 入口 -->
  <script type="module" src="/src/client/main.ts"></script>
</body>
</html>
