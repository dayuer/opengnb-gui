<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GNB P2P VPN 节点管理中控台 — 实时监控、审批注册、AI 智能运维">
  <title>GNB Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-left">
        <div class="logo">◈ GNB Console</div>
        <span class="version">v0.1.0</span>
      </div>
      <div class="header-right">
        <span id="connection-status" class="status-badge offline">断开</span>
        <span id="last-update" class="meta-text">—</span>
      </div>
    </header>

    <main id="main">
      <!-- 左侧：节点列表 + 待审批 -->
      <aside id="node-list-panel">
        <div class="panel-header">
          <h2>已接入节点</h2>
          <span id="node-count" class="badge">0</span>
        </div>
        <ul id="node-list"></ul>

        <div class="panel-header" style="border-top:1px solid var(--border)">
          <h2>待审批</h2>
          <span id="pending-count" class="badge accent">0</span>
        </div>
        <div id="pending-list"></div>
      </aside>

      <!-- 中间：节点详情 -->
      <section id="node-detail-panel">
        <div class="panel-header">
          <h2 id="detail-title">选择节点查看详情</h2>
        </div>
        <div id="detail-content" class="detail-grid">
          <div class="detail-placeholder">
            <span class="placeholder-icon">◇</span>
            <p>从左侧选择一个节点</p>
          </div>
        </div>
      </section>

      <!-- 右侧：AI 运维 -->
      <aside id="ai-panel">
        <div class="panel-header">
          <h2>运维控制台</h2>
          <span class="badge accent">指令</span>
        </div>
        <div id="ai-messages"></div>
        <div id="ai-quick-actions">
          <button class="quick-btn" data-cmd="安装 openclaw">📦 安装 OpenClaw</button>
          <button class="quick-btn" data-cmd="状态">📊 状态</button>
          <button class="quick-btn" data-cmd="重启 gnb">🔄 重启 GNB</button>
          <button class="quick-btn" data-cmd="重启 openclaw">🔄 重启 Claw</button>
          <button class="quick-btn" data-cmd="日志">📋 日志</button>
        </div>
        <div id="ai-input-area">
          <input type="text" id="ai-input" placeholder="输入运维指令..." autocomplete="off">
          <button id="ai-send">发送</button>
        </div>
      </aside>
    </main>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
