<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SynonClaw Console — P2P VPN 节点管理中控台，实时监控、审批注册、AI 智能运维">
  <title>SynonClaw Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <!-- @beta: 独立全屏登录页 -->
  <div id="login-page" style="display:none">
    <div class="login-bg">
      <div class="login-bg-orb login-bg-orb-1"></div>
      <div class="login-bg-orb login-bg-orb-2"></div>
      <div class="login-bg-orb login-bg-orb-3"></div>
    </div>
    <div class="login-card">
      <div class="login-brand">
        <div class="login-logo">◈</div>
        <h1 class="login-title">SynonClaw Console</h1>
        <p class="login-subtitle">P2P VPN 管理中控台</p>
      </div>
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="login-field">
          <label for="login-username">用户名</label>
          <div class="login-input-wrap">
            <i data-lucide="user" class="login-input-icon"></i>
            <input type="text" id="login-username" placeholder="输入用户名" autocomplete="username" required>
          </div>
        </div>
        <div class="login-field">
          <label for="login-password">密码</label>
          <div class="login-input-wrap">
            <i data-lucide="lock" class="login-input-icon"></i>
            <input type="password" id="login-password" placeholder="输入密码" autocomplete="current-password" required>
          </div>
        </div>
        <div id="login-error" class="login-error"></div>
        <button type="submit" class="login-btn" id="login-btn">
          <span id="login-btn-text">登 录</span>
          <i data-lucide="arrow-right" class="login-btn-icon"></i>
        </button>
      </form>
      <div class="login-footer">
        <span>Powered by <a href="https://github.com/gnbdev/opengnb" target="_blank" rel="noopener">OpenGNB</a></span>
      </div>
    </div>
  </div>

  <div id="app" style="display:none">
    <!-- 左侧：抽屉导航 -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <span class="logo">◈ SynonClaw Console</span>
        <span class="version">v0.1.0</span>
      </div>
      <ul id="nav-menu">
        <li class="nav-item active" data-page="dashboard">
          <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span><span class="nav-label">仪表盘</span>
        </li>
        <li class="nav-item" data-page="monitor">
          <span class="nav-icon"><i data-lucide="monitor"></i></span><span class="nav-label">运维监控</span>
        </li>
        <li class="nav-item" data-page="nodes">
          <span class="nav-icon"><i data-lucide="globe"></i></span><span class="nav-label">节点管理</span>
        </li>
        <li class="nav-item" data-page="users">
          <span class="nav-icon"><i data-lucide="users"></i></span><span class="nav-label">用户管理</span>
        </li>
        <li class="nav-item" data-page="groups">
          <span class="nav-icon"><i data-lucide="folder"></i></span><span class="nav-label">分组管理</span>
        </li>
        <li class="nav-item" data-page="settings">
          <span class="nav-icon"><i data-lucide="settings"></i></span><span class="nav-label">系统设置</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div id="sidebar-status">
          <span id="connection-status" class="status-badge offline">断开</span>
          <span id="last-update" class="meta-text">—</span>
        </div>
      </div>
    </nav>

    <!-- 主内容区 -->
    <div id="main-wrapper">
      <header id="header">
        <div class="header-left">
          <button id="sidebar-toggle" class="sidebar-toggle-btn"><i data-lucide="menu"></i></button>
          <h1 id="page-title">仪表盘</h1>
        </div>
        <div class="header-right">
          <span id="pending-badge" class="badge accent" style="display:none;cursor:pointer" onclick="switchPage('nodes');setTimeout(()=>{const s=document.getElementById('filter-status');if(s){s.value='pending';s.dispatchEvent(new Event('change'))}},100)">待审批 <span id="pending-count">0</span></span>
          <!-- 用户菜单 -->
          <div class="user-menu" id="user-menu">
            <button class="user-menu-trigger" id="user-menu-trigger" onclick="toggleUserMenu()">
              <span class="user-avatar">AD</span>
              <div class="user-menu-info">
                <span class="user-menu-name">Admin</span>
                <span class="user-menu-role">Admin</span>
              </div>
              <i data-lucide="chevron-down" class="user-menu-chevron"></i>
            </button>
            <div class="user-dropdown" id="user-dropdown">
              <div class="user-dropdown-header">
                <div class="user-dropdown-name">Admin</div>
                <div class="user-dropdown-email">SynonClaw Console 管理员</div>
              </div>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item" onclick="closeUserMenu()">
                <i data-lucide="user"></i><span>个人资料</span>
              </button>
              <button class="user-dropdown-item" onclick="showApiKey()">
                <i data-lucide="key-round"></i><span>API 密钥</span>
              </button>
              <a class="user-dropdown-item" href="https://github.com/gnbdev/opengnb" target="_blank" rel="noopener" onclick="closeUserMenu()">
                <i data-lucide="github"></i><span>GitHub</span>
              </a>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item" id="theme-toggle-btn" onclick="toggleTheme()">
                <i data-lucide="sun" id="theme-icon"></i><span id="theme-label">亮色模式</span>
              </button>
              <button class="user-dropdown-item" onclick="closeUserMenu()">
                <i data-lucide="help-circle"></i><span>重新查看新手引导</span>
              </button>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item danger" onclick="logout()">
                <i data-lucide="log-out"></i><span>退出登录</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <div id="main-content">
        <!-- 页面内容由 JS 动态渲染 -->
      </div>
    </div>

    <!-- 全局弹窗 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none">
      <div class="modal" id="modal-content"></div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
