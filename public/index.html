<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GNB P2P VPN 节点管理中控台 — 实时监控、审批注册、AI 智能运维">
  <title>GNB Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- 左侧：抽屉导航 -->
    <nav id="sidebar">
      <div class="sidebar-logo">
        <span class="logo">◈ GNB Console</span>
        <span class="version">v0.1.0</span>
      </div>
      <ul id="nav-menu">
        <li class="nav-item active" data-page="dashboard">
          <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span><span class="nav-label">仪表盘</span>
        </li>
        <li class="nav-item" data-page="monitor">
          <span class="nav-icon"><i data-lucide="monitor"></i></span><span class="nav-label">运维监控</span>
        </li>
        <li class="nav-item" data-page="nodes">
          <span class="nav-icon"><i data-lucide="globe"></i></span><span class="nav-label">节点管理</span>
        </li>
        <li class="nav-item" data-page="users">
          <span class="nav-icon"><i data-lucide="users"></i></span><span class="nav-label">用户管理</span>
        </li>
        <li class="nav-item" data-page="groups">
          <span class="nav-icon"><i data-lucide="folder"></i></span><span class="nav-label">分组管理</span>
        </li>
        <li class="nav-item" data-page="settings">
          <span class="nav-icon"><i data-lucide="settings"></i></span><span class="nav-label">系统设置</span>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div id="sidebar-status">
          <span id="connection-status" class="status-badge offline">断开</span>
          <span id="last-update" class="meta-text">—</span>
        </div>
      </div>
    </nav>

    <!-- 主内容区 -->
    <div id="main-wrapper">
      <header id="header">
        <div class="header-left">
          <button id="sidebar-toggle" class="sidebar-toggle-btn"><i data-lucide="menu"></i></button>
          <h1 id="page-title">仪表盘</h1>
        </div>
        <div class="header-right">
          <span id="pending-badge" class="badge accent" style="display:none">待审批 <span id="pending-count">0</span></span>
          <!-- 用户菜单 -->
          <div class="user-menu" id="user-menu">
            <button class="user-menu-trigger" id="user-menu-trigger" onclick="toggleUserMenu()">
              <span class="user-avatar">AD</span>
              <div class="user-menu-info">
                <span class="user-menu-name">Admin</span>
                <span class="user-menu-role">Admin</span>
              </div>
              <i data-lucide="chevron-down" class="user-menu-chevron"></i>
            </button>
            <div class="user-dropdown" id="user-dropdown">
              <div class="user-dropdown-header">
                <div class="user-dropdown-name">Admin</div>
                <div class="user-dropdown-email">GNB Console 管理员</div>
              </div>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item" onclick="closeUserMenu()">
                <i data-lucide="user"></i><span>个人资料</span>
              </button>
              <button class="user-dropdown-item" onclick="showApiKey()">
                <i data-lucide="key-round"></i><span>API 密钥</span>
              </button>
              <a class="user-dropdown-item" href="https://github.com/gnbdev/opengnb" target="_blank" rel="noopener" onclick="closeUserMenu()">
                <i data-lucide="github"></i><span>GitHub</span>
              </a>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item" onclick="closeUserMenu()">
                <i data-lucide="help-circle"></i><span>重新查看新手引导</span>
              </button>
              <div class="user-dropdown-divider"></div>
              <button class="user-dropdown-item danger" onclick="logout()">
                <i data-lucide="log-out"></i><span>退出登录</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <div id="main-content">
        <!-- 页面内容由 JS 动态渲染 -->
      </div>
    </div>

    <!-- 全局弹窗 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none">
      <div class="modal" id="modal-content"></div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
